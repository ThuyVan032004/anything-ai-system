global:
  scrape_interval: 1m

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 1m
    static_configs:
    - targets: ['host.docker.internal:9090']
  
  - job_name: 'node-exporter'
    static_configs:
    - targets: ['host.docker.internal:9100']

  - job_name: 'emotion-analysis-service'
    scrape_interval: 5s
    static_configs:
    - targets: ['host.docker.internal:8765']
  
  - job_name: 'monitoring-service'
    scrape_interval: 5s
    static_configs:
    - targets: ['host.docker.internal:8767']
