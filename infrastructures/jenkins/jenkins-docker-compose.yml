version: '3'
services:
  jenkins-docker:
    image: docker:dind
    container_name: jenkins-docker
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
      - JAVA_OPTS="-Xmx256m -Xms256m"
    volumes:
      - ./jenkins_docker_certs:/certs/client
      - ./jenkins_home:/var/jenkins_home
    restart: always
    ports:
      - "2375:2375"
    command: --storage-driver overlay2
    networks:
      - jenkins
      - shared-network
  
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    user: root
    ports:
      - "8088:8080"
      - "50000:50000"
    environment:
      - DOCKER_HOST=tcp://jenkins-docker:2375
      - DOCKER_CERT_PATH=/certs/client
      - DOCKER_CERT_VERIFY=1
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - ./jenkins_docker_certs:/certs/client:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    depends_on:
      - jenkins-docker
    restart: always
    networks:
      - jenkins
      - shared-network

networks:
  jenkins:
    driver: bridge
  shared-network:
    external: true
