version: '3'

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.10.4
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__FERNET_KEY: 'glh6NO-GASPrhPId03fIHqh1yhNlouf7JMJ2X_EhuT0='
    AIRFLOW__CORE__SECRET_KEY: '45c0e69b2dac192f8bf21d432e70d54ada766e9cd1b1ddea2b075ea0ff9cfcaa'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__DAG_DISCOVERY_SAFE_MODE: 'false'
    PYTHONPATH: /opt/airflow
    DOCKER_HOST: tcp://jenkins-docker:2375
  volumes:
    - ../../emotion_analysis/pipelines/data_pipelines:/opt/airflow/dags/emotion_analysis/data_pipelines
    - ../../emotion_analysis/pipelines/training_pipelines:/opt/airflow/dags/emotion_analysis/training_pipelines
    - ../../shared:/opt/airflow/shared
    - ../../emotion_analysis:/opt/airflow/emotion_analysis
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - shared-network
  depends_on:
    &airflow-common-dependencies
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 15s
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./schema-creation.sql:/docker-entrypoint-initdb.d/schema-creation.sql
    restart: always
    networks:
      - shared-network

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: bash -c "airflow db migrate && \
      airflow users create --username ${AIRFLOW_USERNAME} \
      --password ${AIRFLOW_PASSWORD} --role Admin \
      --email dovan032004@gmail.com \
      --firstname Do \
      --lastname Van && \
      airflow variables set AWS_S3_BUCKET ${AWS_S3_BUCKET} && \
      airflow variables set AWS_ACCESS_KEY_ID ${AWS_ACCESS_KEY_ID} && \
      airflow variables set AWS_SECRET_ACCESS_KEY ${AWS_SECRET_ACCESS_KEY}"
    environment:
      <<: *airflow-common-env
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      - airflow-init
      - postgres

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      - airflow-init
      - postgres

  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type TriggererJob --hostname \"$${HOSTNAME}\""]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      - airflow-init
      - postgres

networks:
  shared-network:
    external: true